<script type="text/babel">
  const { useState } = React;
  const TaTable = ({ user, data, onRefresh, setOnEdit }) => {
    const formatDate = (dateString) => {
      if (!dateString) return "-";
      const date = new Date(dateString);
      if (date.getFullYear() > 2400) date.setFullYear(date.getFullYear() - 543);
      return date.toLocaleDateString("th-TH", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      });
    };

    // ตรวจสอบว่ามีข้อมูลหรือไม่
    if (!data || data.length === 0) {
      return <div className="text-center p-4">ไม่พบข้อมูล</div>;
    }

    const handleClickUpdate = (taData) => {
      setOnEdit(taData);
    };

    const handleClickDelete = (taUserName) => {
      const userRole = user.role;

      Swal.fire({
        title: "คุณแน่ใจใช่ไหมว่าต้องการลบบัญชีผู้ใช้นี้?",
        icon: "warning",
        showCancelButton: true,
        cancelButtonText: "ไม่, ยกเลิก",
        confirmButtonText: "ยืนยัน",
        showLoaderOnConfirm: true,

        preConfirm: () => {
          return new Promise((resolve, reject) => {
            const deleteData = {
              taUserName,
              userRole,
            };
            google.script.run
              .withSuccessHandler((res) => {
                if (res.success) {
                  resolve(res); // resoponse data to then
                } else {
                  Swal.showValidationMessage(
                    res.message || "เกิดข้อผิดพลาดจากเซิร์ฟเวอร์",
                  );
                  resolve(false);
                }
              })
              .withFailureHandler((err) => {
                Swal.showValidationMessage(`เกิดข้อผิดพลาด: ${err.message}`);
                resolve(false);
              })
              .delateTaData(deleteData);
          });
        },
      }).then((result) => {
        if (result.isConfirmed && result.value) {
          Swal.fire({
            icon: "success",
            title: "ลบบัญชีผู้ใช้เสร็จสิ้น",
            text: result.value.message,
            timer: 2000,
            showConfirmButton: false,
          }).then(() => {
            onRefresh();
          });
        }
      });
    };

    return (
      <div className="overflow-x-auto shadow-md rounded-lg border border-base-200 mt-4">
        <table className="table table-zebra w-full">
          {/* --- Head --- */}
          <thead className="bg-base-200 text-gray-500">
            <tr className="font-normal">
              <td className="text-center">ลำดับ</td>
              <td>ชื่อ-สกุล</td>
              <td>ชื่อผู้ใช้งาน (username)</td>
              <td>สิทธิ์การใช้งาน</td>
              <td>เวลาที่สร้าง</td>
              <td className="text-center">ตัวดำเนินการ</td>
            </tr>
          </thead>

          {/* --- Body --- */}
          <tbody>
            {data.map((row, index) => (
              <tr key={row.Username} className="hover:bg-base-200">
                {/* ลำดับ */}
                <th className="text-center">{index + 1}</th>

                {/* ชื่อ-สกุล และ Role */}
                <td>
                  <div>{row.Name}</div>
                </td>

                {/* ชื่อผู้ใช้งาน */}
                <td>{row.Username}</td>

                <td>{row.Role}</td>

                {/* เวลาที่สร้าง */}
                <td>{formatDate(row.TimeStamp)}</td>

                {/* ตัวดำเนินการ */}
                <td className="text-center">
                  <div className="join">
                    <button
                      onClick={() => handleClickUpdate(row)}
                      className="btn btn-sm btn-info join-item text-white"
                    >
                      <i className="fa-solid fa-pen-to-square"></i> แก้ไข
                    </button>
                    <button
                      onClick={() => handleClickDelete(row.Username)}
                      className="btn btn-sm btn-error join-item text-white"
                    >
                      <i className="fa-solid fa-trash"></i> ลบ
                    </button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    );
  };
</script>
