<script type="text/babel">
  const { useState } = React;
  const { useLocation, Link } = ReactRouterDOM;

  const Sidebar = ({ user, setUser, onLogout, children }) => {
    const location = useLocation();
    const [isSidebarOpen, setIsSidebarOpen] = useState(false);
    const [isExpanded, setIsExpanded] = useState(true);

    const sideBarItems = [
      { name: "หน้าหลัก", path: "/", icon: "fa-solid fa-house" },
      { name: "แดชบอร์ด", path: "/system", icon: "fa-solid fa-chart-line" },
      {
        name: "จัดการผู้ใช้งาน (TA)",
        path: "/system/manage-ta",
        icon: "fa-solid fa-users",
      },
      {
        name: "จัดการผู้สัมภาษณ์ (Manager)",
        path: "/system/manage-manager",
        icon: "fa-solid fa-building-user",
      },
      {
        name: "จัดการอีเวนต์",
        path: "/system/manage-events",
        icon: "fa-solid fa-calendar-days",
      },
      {
        name: "จัดการตำแหน่งงานว่าง",
        path: "/system/manage-job-hiring",
        icon: "fa-solid fa-images",
      },
      {
        name: "ฐานข้อมูลผู้สมัคร",
        path: "/system/pool-candidate",
        icon: "fa-solid fa-list",
      },
      {
        name: "แนบลิงก์สัมภาษณ์",
        path: "/system/add-link",
        icon: "fa-solid fa-link",
      },
    ];

    const toggleSidebar = () => setIsSidebarOpen(!isSidebarOpen);
    const toggleExpand = () => setIsExpanded(!isExpanded);

    return (
      <div className="drawer lg:drawer-open bg-base-200 min-h-screen font-sans antialiased">
        <input
          id="my-drawer-4"
          type="checkbox"
          className="drawer-toggle"
          checked={isSidebarOpen}
          onChange={toggleSidebar}
        />

        {/* --- Main Content --- */}
        <div className="drawer-content flex flex-col transition-all duration-300">
          {/* Navbar */}
          <nav className="navbar flex items-center justify-between gap-4 bg-base-100 border-b border-base-300 sticky top-0 z-30 px-4 sm:px-6">
            <div className="flex-none lg:hidden">
              <label
                htmlFor="my-drawer-4"
                aria-label="open sidebar"
                className="btn btn-square btn-ghost text-slate-500 hover:text-emerald-600 hover:bg-emerald-50"
              >
                <i className="fa-solid fa-bars text-xl"></i>
              </label>
            </div>

            <div className="hidden lg:block">
              <button onClick={toggleExpand} className={`btn btn-ghost btn-sm`}>
                <i
                  className={`fa-solid fa-angles-right text-gray-500 text-sm ${
                    isExpanded ? "rotate-180" : ""
                  }`}
                ></i>
              </button>
            </div>
            <div className="flex items-center gap-2">
              <div className="text-right hidden sm:block">
                <p className="text-sm font-semibold text-slate-700">
                  {user?.name || "ผู้ใช้งาน"}
                </p>
                <p className="text-xs text-slate-500">
                  {user.role === "ADMIN" ? "Admin Role" : "Superadmin Role"}
                </p>
              </div>
              <div className="avatar placeholder">
                <div className="bg-emerald-600 text-neutral-content rounded-full w-10 ring ring-emerald-100 ring-offset-2 flex items-center justify-center">
                  <span className="text-lg font-bold">
                    {(user?.name || "U").charAt(0).toUpperCase()}
                  </span>
                </div>
              </div>
            </div>
          </nav>

          {/* Page Content Area */}
          <main className="px-4 pt-10 md:px-10 flex-1 bg-base-100 border border-base-300">
            <div className="max-w-7xl xl:max-w-[1440px] mx-auto">{children}</div>
          </main>
        </div>

        {/* --- Sidebar --- */}
        <div className="drawer-side z-40">
          <label
            htmlFor="my-drawer-4"
            aria-label="close sidebar"
            className="drawer-overlay"
            onClick={toggleSidebar}
          ></label>

          <aside
            className={`
              min-h-full bg-base-100 text-base-content flex flex-col border-r border-base-300 shadow-xl
              transition-all duration-300 ease-in-out
              ${isExpanded ? "w-68" : "w-20"} 
            `}
          >
            {/* Sidebar Header & Toggle Button */}
            <div className="h-16 flex items-center justify-center px-4 border-b border-base-300 relative">
              {/* Logo Area */}
              <Link
                to="/"
                className={`flex items-center justify-center w-full transition-all duration-300 cursor-pointer hover:scale-110 ${
                  !isExpanded && "opacity-0 hidden"
                }`}
              >
                <img
                  src="https://companieslogo.com/img/orig/COM7.BK_BIG-1d5f8726.png?t=1720244491"
                  alt="logo"
                  className="h-8"
                />
              </Link>

              {/* Icon เมื่อหด (Optional: แสดงแทน Logo ใหญ่) */}
              {!isExpanded && (
                <div className="avatar">
                  <Link to="/" className="w-8 rounded-full">
                    <img
                      src="https://companieslogo.com/img/orig/COM7.BK-7f86e1ae.png?t=1720244491"
                      alt="com-logo"
                    />
                  </Link>
                </div>
              )}
            </div>

            {/* Sidebar Menu */}
            <ul className="w-full menu p-2 flex-1 gap-2 overflow-hidden mt-2">
              {sideBarItems.map((item, index) => {
                const isActive = location.pathname === item.path;
                return (
                  <li
                    key={index}
                    // Logic: ถ้าหด Sidebar ให้ใส่ tooltip class
                    className={
                      !isExpanded
                        ? "tooltip hover:tooltip-open tooltip-right z-50"
                        : ""
                    }
                    data-tip={item.name}
                  >
                    <Link
                      to={item.path}
                      className={`
                        group relative flex items-center gap-4 px-3 py-3 rounded-lg transition-all duration-200
                        ${!isExpanded ? "justify-center" : ""} 
                        ${
                          isActive
                            ? "bg-emerald-50 text-emerald-700"
                            : "text-slate-600 hover:bg-slate-50 hover:text-emerald-600"
                        }
                      `}
                    >
                      {/* Active Indicator (เฉพาะตอนขยาย) */}
                      {isActive && isExpanded && (
                        <span className="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-8 bg-emerald-600 rounded-r-full"></span>
                      )}

                      <i
                        className={`
                        ${
                          item.icon
                        } text-lg transition-transform group-hover:scale-110
                        ${
                          isActive
                            ? "text-emerald-600"
                            : "text-slate-400 group-hover:text-emerald-500"
                        }
                      `}
                      ></i>

                      {/* Text Label (ซ่อนเมื่อหด) */}
                      <span
                        className={`whitespace-nowrap transition-all duration-200 ${
                          !isExpanded
                            ? "hidden w-0 opacity-0"
                            : "block opacity-100"
                        }`}
                      >
                        {item.name}
                      </span>
                    </Link>
                  </li>
                );
              })}
            </ul>

            {/* Sidebar Footer (User Info & Logout) */}
            <div className="p-4 border-t border-base-300 bg-base-200">
              {isExpanded ? (
                // --- แบบขยาย: โชว์ครบ ---
                <div className="flex flex-col gap-3 animate-fade-in">
                  <div className="flex items-center gap-3 p-2 bg-white rounded-xl border border-base-300 shadow-sm">
                    <div className="avatar placeholder">
                      <div className="bg-emerald-600 text-neutral-content rounded-full w-10 ring ring-emerald-100 ring-offset-1 flex items-center justify-center">
                        <span className="text-lg font-bold">
                          {(user?.name || "U").charAt(0)}
                        </span>
                      </div>
                    </div>
                    <div className="overflow-hidden">
                      <p className="font-bold text-sm text-slate-700 truncate">
                        {user?.name || "ผู้ใช้งาน"}
                      </p>
                      <p className="text-xs text-slate-500">
                        {user && user?.role === "ADMIN" ? "Administrator" : "Supervisor"}
                      </p>
                    </div>
                  </div>

                  <button
                    className="btn btn-outline btn-error btn-sm w-full gap-2"
                    onClick={() => {
                      onLogout?.();
                      setIsSidebarOpen(false);
                    }}
                  >
                    <i className="fa-solid fa-right-from-bracket"></i>
                    ออกจากระบบ
                  </button>
                </div>
              ) : (
                // --- แบบหด: โชว์ icon ---
                <div className="flex flex-col items-center gap-4">
                  <div className="avatar avatart-placeholder">
                    <div className="bg-emerald-600 text-neutral-content rounded-full w-8 ring ring-emerald-100 flex items-center justify-center">
                      <span className="text-sm">
                        {(user?.name || "U").charAt(0)}
                      </span>
                    </div>
                  </div>
                  <button
                    className="btn btn-error btn-outline"
                    onClick={() => {
                      onLogout?.();
                    }}
                  >
                    <i className="fa-solid fa-right-from-bracket"></i>
                  </button>
                </div>
              )}
            </div>
          </aside>
        </div>
      </div>
    );
  };
</script>
