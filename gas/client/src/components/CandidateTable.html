<script type="text/babel">
  const { useState } = React;

  const CandidateTable = ({
    candidates,
    isClickDeleted,
    isClickSelected,
    setIsSeeMoreDetail,
    selectedDatas,
    setSelectedDatas,
    user,
  }) => {
    const isAllSelected =
      candidates.length > 0 && selectedDatas.length === candidates.length;

    useEffect(() => {
      if (!isClickDeleted && !isClickSelected) {
        setSelectedDatas([]);
      }
    }, [isClickDeleted, isClickSelected]);

    const handleSelectAll = () => {
      if (isAllSelected) {
        setSelectedDatas([]);
      } else {
        setSelectedDatas(candidates);
      }
    };

    const handleCheckboxClick = (e, candidate) => {
      e.stopPropagation();

      const isAlreadySelected = selectedDatas.some(
        (item) => item.Interview_Id === candidate.Interview_Id,
      );

      if (isAlreadySelected) {
        setSelectedDatas((prev) =>
          prev.filter((item) => item.Interview_Id !== candidate.Interview_Id),
        );
      } else {
        setSelectedDatas((prev) => [...prev, candidate]);
      }
    };

    const getStatusStyle = (status) => {
      switch (status) {
        case "รอการพิจารณา":
          return "bg-yellow-100 text-yellow-700 border-yellow-200";
        case "ผ่าน":
          return "bg-green-100 text-green-700 border-green-200";
        case "ไม่ผ่าน":
          return "bg-red-100 text-red-700 border-red-200";
        case "ไม่ผ่านการพิจารณา":
          return "bg-red-100 text-red-700 border-red-200";
        case "เก็บไว้พิจารณา":
          return "bg-gray-100 text-gray-700 border-gray-200";
        default:
          return "bg-yellow-100 text-yellow-700 border-yellow-200";
      }
    };

    return (
      <div className="overflow-x-auto overflow-y-hidden shadow-md rounded-lg border border-base-200 mt-4">
        <table className="table table-zebra w-full">
          {/* head */}
          <thead className="bg-base-200 text-gray-500">
            <tr className="text-gray-500 text-sm font-normal">
              {isClickDeleted && (
                <td className="text-center">
                  <input
                    type="checkbox"
                    checked={isAllSelected}
                    onClick={handleSelectAll}
                    className="checkbox checkbox-sm checkbox-error rounded-md"
                  />
                </td>
              )}

              {isClickSelected && (
                <td className="text-center">
                  <input
                    type="checkbox"
                    checked={isAllSelected}
                    onClick={handleSelectAll}
                    className="checkbox checkbox-sm checkbox-success rounded-md"
                  />
                </td>
              )}
              <td>อีเวนต์</td>
              <td>ชื่อ-สกุล</td>
              <td>การศึกษาสูงสุด</td>
              <td>ประเภทงานที่สนใจ</td>
              <td>ตำแหน่งงานที่สนใจ</td>
              <td>สถานที่ที่สนใจ</td>
              {user && (user.role === "ADMIN" || user.role === "SUPERADMIN")}
              <td>ลิงก์สัมภาษณ์</td>
              <td className="text-center">สถานะ</td>
            </tr>
          </thead>
          <tbody>
            {candidates.map((candidate) => {
              const {
                Interview_Id,
                Fullname,
                Highest_Education,
                Position_Type,
                Position_Applied,
                Preferred_Province,
                Interview_Link,
              } = candidate;
              const { Event_Name } = candidate.eventDetail;
              const isSelected = selectedDatas.some(
                (item) => item.Interview_Id === Interview_Id,
              );

              return (
                <tr
                  key={Interview_Id}
                  onClick={() => setIsSeeMoreDetail(candidate)}
                  className={`
                    group cursor-pointer transition-all duration-200 hover:bg-base-200
                    ${isSelected && isClickDeleted ? "bg-red-50 hover:bg-red-50" : isSelected && isClickSelected ? "bg-green-50 hover:bg-green-50" : ""}
                  `}
                >
                  {isClickDeleted && (
                    <td className="text-center">
                      <label onClick={(e) => e.stopPropagation()}>
                        <input
                          type="checkbox"
                          className="checkbox checkbox-sm checkbox-error rounded-md"
                          checked={isSelected}
                          onChange={(e) => handleCheckboxClick(e, candidate)}
                        />
                      </label>
                    </td>
                  )}

                  {isClickSelected && (
                    <td className="text-center">
                      <label onClick={(e) => e.stopPropagation()}>
                        <input
                          type="checkbox"
                          className="checkbox checkbox-sm checkbox-success rounded-md"
                          checked={isSelected}
                          onChange={(e) => handleCheckboxClick(e, candidate)}
                        />
                      </label>
                    </td>
                  )}

                  <td className="text-sm truncate max-w-60">{Event_Name}</td>
                  <td className="text-sm truncate max-w-48">{Fullname}</td>
                  <td className="text-sm truncate max-w-40">{Highest_Education}</td>
                  <td className="text-sm truncate max-w-40">{Position_Type}</td>
                  <td className="text-sm truncate max-w-40">{Position_Applied}</td>
                  <td className="text-sm">{Preferred_Province}</td>
                  <td className="text-center">
                    {Interview_Link && Interview_Link !== ""
                      ? "✅ มีลิงก์"
                      : "❌ ไม่มีลิงก์"}
                  </td>

                  <td className="md:text-nowrap text-sm text-center">
                    <span
                      className={`badge badge-sm ${getStatusStyle(
                        candidate.Status,
                      )}`}
                    >
                      {candidate.Status}
                    </span>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>

        {/* --- Selection Stats (Optional: แสดงเมื่อมีการเลือก) --- */}
        {isClickDeleted && selectedDatas.length > 0 && (
          <div className="my-2 pr-2 text-sm text-red-500 font-medium flex justify-end animate-fade-in">
            <i className="fa-solid fa-circle-check mr-2 mt-1"></i>
            เลือกแล้ว {selectedDatas.length} รายการ
          </div>
        )}

        {isClickSelected && selectedDatas.length > 0 && (
          <div className="my-2 pr-2 text-sm text-green-500 font-medium flex justify-end animate-fade-in">
            <i className="fa-solid fa-circle-check mr-2 mt-1"></i>
            เลือกแล้ว {selectedDatas.length} รายการ
          </div>
        )}
      </div>
    );
  };
</script>
