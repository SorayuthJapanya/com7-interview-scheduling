<script type="text/babel">
  const { useHistory } = ReactRouterDOM;
  const UserInterviewDetailModal = ({
    interview,
    isOpen,
    onClose,
    user,
    onRefresh,
  }) => {
    if (!isOpen || !interview) return null;
    const history = useHistory();

    const formatQueryData = (date) => {
      if (!date) return "-";
      const dateObject = new Date(date);
      if (dateObject.getFullYear() > 2400)
        dateObject.setFullYear(dateObject.getFullYear() - 543);
      const formattedDate = dateObject.toISOString().split("T")[0];
      return formattedDate;
    };

    // --- Helpers ---
    const formatDate = (dateString) => {
      if (!dateString) return "-";

      try {
        const parts = dateString.split("/");
        if (parts.length !== 3) return dateString;

        const day = parseInt(parts[0], 10);
        const month = parseInt(parts[1], 10) - 1;
        let year = parseInt(parts[2], 10);

        if (year > 2400) {
          year -= 543;
        }

        const date = new Date(year, month, day);

        if (isNaN(date.getTime())) return "-";

        return date.toLocaleDateString("th-TH", {
          year: "numeric",
          month: "long",
          day: "numeric",
        });
      } catch (e) {
        return "-";
      }
    };

    const formatTime = (timeString) => {
      if (!timeString) return "-";
      const [hour, minute] = timeString.split(":");

      const formattedHour = hour.padStart(2, "0");
      const formattedMinute = (minute || "00").padStart(2, "0");

      return `${formattedHour}:${formattedMinute} น.`;
    };

    const getStatusStyle = (status) => {
      switch (status) {
        case "รอการพิจารณา":
          return "bg-yellow-100 text-yellow-700 border-yellow-200";
        case "ผ่าน":
          return "bg-green-100 text-green-700 border-green-200";
        case "ไม่ผ่าน":
          return "bg-red-100 text-red-700 border-red-200";
        case "ไม่ผ่านการพิจารณา":
          return "bg-red-100 text-red-700 border-red-200";
        case "เก็บไว้พิจารณา":
          return "bg-gray-100 text-gray-700 border-gray-200";
        default:
          return "bg-yellow-100 text-yellow-700 border-yellow-200";
      }
    };

    const {
      Fullname,
      Nickname,
      Position_Applied,
      Position_Type,
      Available_Start_Date,
      Status,
      Email,
      Phone_Number,
      Line_Id,
      Current_Address,
      Highest_Education,
      Institution,
      Faculty,
      Major,
      Expected_Salary,
      Resume_Url,
      eventDetail,
      slotDetail,
      Preferred_Province,
      Preferred_District,
      Work_Description,
      Work_Location,
      Work_Position,
      Work_Period,
      Interview_Id,
      Interview_Date,
      Interview_Link,
    } = interview;

    // functions
    const handleClickEditProfile = () => {
      const eventId = eventDetail.Sheet_ID;
      const eventType = eventDetail.Event_Type;

      const interviewId = interview.Interview_Id;
      const dateQuery = formatQueryData(Interview_Date);

      const params = new URLSearchParams();

      if (interviewId) params.append("interviewId", interviewId);
      if (eventId) params.append("eventId", eventId);
      if (eventType) params.append("eventType", eventType);
      if (dateQuery) params.append("dateQuery", dateQuery);

      onClose();

      history.push({
        pathname: "/interview/edit",
        search: params.toString(),
      });
      window.scrollTo(0, 0);
    };

    const handleClickReSchedule = () => {
      const eventId = eventDetail.Sheet_ID;
      const slotId = slotDetail.Slot_Id;
      const interviewId = interview.Interview_Id;
      const eventName = eventDetail.Event_Name;
      const eventLocation = eventDetail.Location;
      const eventType = eventDetail.Event_Type;

      const params = new URLSearchParams();

      if (eventId) params.append("eventId", eventId);
      if (slotId) params.append("slotId", slotId);
      if (interviewId) params.append("interviewId", interviewId);
      if (eventName) params.append("eventName", eventName);
      if (eventLocation) params.append("eventLocation", eventLocation);
      if (eventType) params.append("eventType", eventType);
      if (Preferred_Province) params.append("preferredProvince", Preferred_Province);
      if (interview.Shop) params.append("shop", interview.Shop);

      onClose();

      history.push({
        pathname: "/events/slots/edit",
        search: params.toString(),
      });
      window.scrollTo(0, 0);
    };

    const handleDeleteInterview = () => {
      const eventId = eventDetail.Sheet_ID;
      const interviewId = interview.Interview_Id;
      const userName = user.name;
      const userRole = user.role;
      const userId = user.userId;

      Swal.fire({
        title: "คุณแน่ใจใช่ไหมว่าต้องการยกเลิกการนัดหมาย?",
        text: "โปรดระบุสาเหตุที่ต้องการยกเลิก",
        icon: "warning",
        input: "textarea",
        inputPlaceholder: "ระบุเหตุผลในการยกเลิกที่นี่...",
        inputAttributes: {
          "aria-label": "ระบุเหตุผลในการยกเลิก",
        },
        showCancelButton: true,
        cancelButtonText: "ไม่, เปลี่ยนใจแล้ว",
        confirmButtonText: "ยืนยัน",
        showLoaderOnConfirm: true,

        inputValidator: (value) => {
          if (!value) {
            return "กรุณาระบุเหตุผลในการยกเลิก";
          }
        },

        preConfirm: (inputValue) => {
          const description = inputValue;

          const payload = {
            userRole,
            userName,
            userId,
            eventId,
            interviewIds: Array.from([interviewId]),
            description,
          };

          return new Promise((resolve, reject) => {
            google.script.run
              .withSuccessHandler((res) => {
                if (res.success) {
                  resolve(res); // resoponse data to then
                } else {
                  Swal.showValidationMessage(
                    res.message || "เกิดข้อผิดพลาดจากเซิร์ฟเวอร์",
                  );
                  resolve(false);
                }
              })
              .withFailureHandler((err) => {
                Swal.showValidationMessage(`เกิดข้อผิดพลาด: ${err.message}`);
                resolve(false);
              })
              .deleteInterview(payload);
          });
        },
      }).then((result) => {
        if (result.isConfirmed && result.value) {
          Swal.fire({
            icon: "success",
            title: "ยกเลิกการนัดหมายสำเร็จ",
            text: result.value.message,
            timer: 2000,
            showConfirmButton: false,
          }).then(() => {
            history.push("/");
            window.scrollTo(0, 0);
            onClose();
          });
        }
      });
    };

    return (
      <div className="fixed inset-0 z-[999] flex items-center justify-center p-4 sm:p-6">
        {/* 1. Backdrop */}
        <div
          className="absolute inset-0 bg-black/60 transition-opacity"
          onClick={onClose}
        ></div>

        <div className="bg-white w-full max-w-6xl mx-auto rounded-lg shadow-lg z-50 max-h-[90vh] overflow-y-auto animate-fade-in-up">
          {/* --- HEADER --- */}
          <div className="p-5 sm:p-6 border-b border-base-300 bg-base-200 flex justify-between items-start">
            <div className="flex-1 pr-8">
              <div className="flex flex-wrap items-center gap-2 sm:gap-3 mb-2">
                <h3 className="text-xl font-bold text-gray-800">
                  {eventDetail.Event_Name} - {interview.Shop ? `สาขา ${interview.Shop}` : interview.Bu_Name}
                </h3>
                <span
                  className={`px-3 py-0.5 rounded-full text-xs font-semibold border ${getStatusStyle(
                    Status,
                  )}`}
                >
                  {Status}
                </span>
              </div>

              <div className="flex flex-wrap gap-2 mt-2 text-sm text-gray-600">
                <div className="flex items-center gap-2">
                  <div className="w-8 h-8 flex items-center justify-center rounded-full bg-blue-50 text-blue-600">
                    <i className="fa-regular fa-calendar-days"></i>
                  </div>
                  <span className="font-medium">
                    {formatDate(slotDetail?.Date)}
                  </span>
                </div>

                {/* เวลา */}
                <div className="flex items-center gap-2">
                  <div className="w-8 h-8 flex items-center justify-center rounded-full bg-orange-50 text-orange-600">
                    <i className="fa-regular fa-clock"></i>
                  </div>
                  <span className="font-medium">
                    {formatTime(slotDetail?.Start_Time)} -{" "}
                    {formatTime(slotDetail?.End_Time)}
                  </span>
                </div>

                {/* สถานที่ (ถ้ามี) */}
                {eventDetail?.Location && (
                  <div className="flex items-center gap-2">
                    <div className="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-600">
                      <i className="fa-solid fa-map-location-dot"></i>
                    </div>
                    <span>{eventDetail.Location}</span>
                  </div>
                )}
              </div>

              {Interview_Link && (
                <div className="mt-2">
                  <a
                    href={Interview_Link}
                    target="_blank"
                    rel="noreferrer"
                    onClick={(e) => e.stopPropagation()}
                    className="group inline-flex items-center gap-2 px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white rounded-lg shadow-sm transition-all duration-200 transform active:scale-95"
                  >
                    {/* Icon กล้องวิดีโอ สื่อถึงการประชุม */}
                    <i className="fa-solid fa-video text-lg"></i>
                    <span className="font-medium text-sm sm:text-base">
                      เข้าห้องสัมภาษณ์
                    </span>
                  </a>
                </div>
              )}
            </div>

            {/* Close Button */}
            <button
              onClick={onClose}
              className="absolute top-4 right-4 btn btn-circle btn-ghost cursor-pointer"
            >
              <i className="fa fa-times"></i>
            </button>
          </div>

          {/* --- BODY: 4 Columns Grid --- */}
          <div className="p-6 overflow-y-auto custom-scrollbar">
            {/* ปรับ Grid เป็น 3 คอลัมน์ในหน้าจอใหญ่ (lg) */}
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 sm:gap-8 divider-x-lg">
              {/* Col 1: ข้อมูลผู้สมัคร */}
              <div className="space-y-2 sm:space-y-4">
                <h4 className="text-sm font-medium text-gray-500 uppercase tracking-wider border-b border-base-300 pb-2 mb-3 flex items-center gap-2">
                  <i className="fa fa-user-circle"></i> ข้อมูลผู้สมัคร
                </h4>
                <div className="space-y-1 sm:space-y-3">
                  <UserInffRow
                    iconClass="fa fa-id-card"
                    label="ชื่อ-สกุล"
                    value={`${Fullname} (${Nickname})`}
                  />
                  <UserInffRow
                    iconClass="fa fa-phone-alt"
                    label="เบอร์โทรศัพท์"
                    value={Phone_Number}
                  />
                  <UserInffRow
                    iconClass="fa-brands fa-line"
                    label="Line ID"
                    value={Line_Id}
                  />
                  <UserInffRow
                    iconClass="fa fa-envelope"
                    label="อีเมล"
                    value={Email}
                  />
                  <UserInffRow
                    iconClass="fa fa-map-marker-alt"
                    label="ที่อยู่"
                    value={Current_Address}
                    isLong
                  />
                </div>
              </div>

              <div className="space-y-2 sm:space-y-4">
                <h4 className="text-sm text-gray-500 font-medium uppercase tracking-wider border-b border-base-300 pb-2 mb-3 flex items-center gap-2">
                  <i className="fa fa-graduation-cap"></i> ข้อมูลการศึกษา
                </h4>
                <div className="space-y-1 sm:space-y-3">
                  <UserInffRow
                    iconClass="fa fa-certificate"
                    label="ระดับการศึกษา"
                    value={Highest_Education}
                  />
                  <UserInffRow
                    iconClass="fa fa-university"
                    label="สถาบัน"
                    value={Institution}
                  />
                  <UserInffRow
                    iconClass="fa fa-school"
                    label="คณะ"
                    value={Faculty}
                  />
                  <UserInffRow
                    iconClass="fa fa-book-open"
                    label="สาขาวิชา"
                    value={Major}
                  />
                </div>
              </div>

              <div className="space-y-2 sm:space-y-4">
                <h4 className="text-sm text-gray-500 font-medium uppercase tracking-wider border-b border-base-300 pb-2 mb-3 flex items-center gap-2">
                  <i className="fa fa-briefcase"></i> รายละเอียดงาน
                </h4>
                <div className="space-y-1 sm:space-y-3">
                  <UserInffRow
                    iconClass="fa fa-tag"
                    label="ตำแหน่ง"
                    value={Position_Applied}
                  />
                  <UserInffRow
                    iconClass="fa fa-file-contract"
                    label="ประเภทงาน"
                    value={Position_Type}
                  />
                  <UserInffRow
                    iconClass="fa fa-building"
                    label="จังหวัดและอำเภอ"
                    value={`${Preferred_Province} / ${Preferred_District}`}
                  />
                  <UserInffRow
                    iconClass="fa fa-money-bill-wave"
                    label="เงินเดือนที่คาดหวัง"
                    value={
                      Expected_Salary
                        ? `${Number(Expected_Salary).toLocaleString()} บาท`
                        : "-"
                    }
                  />
                  <UserInffRow
                    iconClass="fa fa-business-time"
                    label="วันเริ่มงาน"
                    value={formatDate(Available_Start_Date)}
                  />
                </div>
              </div>

              <div className="space-y-2 sm:space-y-4">
                <h4 className="text-xs sm:text-sm text-gray-500 font-medium uppercase tracking-wider border-b border-base-300 pb-2 mb-3 flex items-center gap-2">
                  <i className="fa fa-briefcase"></i> ประสบการณ์การทำงานล่าสุด
                </h4>
                <div className="space-y-1 sm:space-y-3">
                  <UserInffRow
                    iconClass="fa fa-map-marker-alt"
                    label="สถานที่ทํางาน"
                    value={Work_Location}
                  />

                  <UserInffRow
                    iconClass="fa fa-calendar-alt"
                    label="ระยะเวลา"
                    value={Work_Period}
                  />

                  <UserInffRow
                    iconClass="fa fa-user-tie"
                    label="ตําแหน่ง"
                    value={Work_Position}
                  />

                  <UserInffRow
                    iconClass="fa fa-tasks"
                    label="รายละเอียดงาน"
                    value={Work_Description}
                  />
                </div>
              </div>
            </div>
          </div>

          {/* --- FOOTER --- */}
          <div className="p-4 bg-base-200 border-t border-base-300 flex flex-row justify-center sm:justify-end gap-3">
            <button
              onClick={handleDeleteInterview}
              className="w-full sm:w-auto justify-center inline-flex items-center gap-2 px-4 py-2 text-sm font-medium text-red-600 bg-red-50/50 border border-red-200 hover:bg-red-100 hover:border-red-300 rounded-lg transition-colors duration-200 cursor-pointer"
            >
              <i className="fa-solid fa-trash-can"></i>
              <p className="hidden sm:block">ยกเลิกนัดหมาย</p>
            </button>

            <button
              onClick={handleClickReSchedule}
              className="w-full sm:w-auto justify-center inline-flex items-center gap-2 px-4 py-2 text-sm font-medium text-amber-600 bg-amber-50/50 border border-amber-200 hover:bg-amber-100 hover:border-amber-300 rounded-lg transition-colors duration-200 cursor-pointer"
            >
              <i className="fa fa-calendar-alt"></i>
              <p className="hidden sm:block">เปลี่ยนเวลานัดหมาย</p>
            </button>

            <button
              onClick={() => handleClickEditProfile()}
              className="w-full sm:w-auto justify-center inline-flex items-center gap-2 px-4 py-2 text-sm font-medium text-indigo-600 bg-indigo-50/50 border border-indigo-200 hover:bg-indigo-100 hover:border-indigo-300 rounded-lg transition-colors duration-200 cursor-pointer"
            >
              <i className="fa fa-user-edit"></i>
              <p className="hidden sm:block">แก้ไขข้อมูลส่วนตัว</p>
            </button>

            <a
              href={Resume_Url}
              target="_blank"
              rel="noreferrer"
              className="w-full sm:w-auto justify-center inline-flex items-center gap-2 px-4 py-2 text-sm font-medium text-emerald-600 bg-emerald-50/50 border border-emerald-200 hover:bg-emerald-100 hover:border-emerald-300 rounded-lg transition-colors duration-200 cursor-pointer"
            >
              <i className="fa fa-file-pdf text-lg"></i>
              <p className="hidden sm:block">Resume</p>
            </a>
          </div>
        </div>
      </div>
    );
  };

  const UserInffRow = ({ iconClass, label, value, isLong }) => (
    <div
      className={`flex ${
        isLong ? "items-start" : "items-center"
      } gap-3 text-sm group hover:bg-base-300 p-1.5 rounded-lg transition-colors`}
    >
      <div className="text-gray-500 group-hover:text-emerald-500 transition-colors shrink-0 mt-0.5 w-6 text-center">
        <i className={`${iconClass}`}></i>
      </div>
      <div className="flex-1 overflow-hidden">
        <span className="text-gray-500 text-xs block mb-0.5">{label}</span>
        <span className="text-gray-900 font-medium break-words block">
          {value || "-"}
        </span>
      </div>
    </div>
  );
</script>
