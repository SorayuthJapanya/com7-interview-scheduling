<script type="text/babel">
  const { useState, useEffect } = React;

  const EditManagerModal = ({
    managerData,
    isOpen,
    onClose,
    onRefresh,
  }) => {
    if (!isOpen) return null;

    const [formData, setFormData] = useState({
      fullname: managerData.Name || "",
      username: managerData.Username || "",
      permissionType: managerData.PermissionType || "",
    });
    const [isLoading, setIsLoading] = useState(false);

    const handleChange = (e) => {
      const { name, value } = e.target;
      setFormData({
        ...formData,
        [name]: value,
      });
    };

    const handleSubmit = (e) => {
      e.preventDefault();
      setIsLoading(true);

      google.script.run
        .withSuccessHandler((res) => {
          if (res.success === true) {
            onClose();
            onRefresh();
            Swal.fire({
              icon: "success",
              title: res.message,
              timer: 2000,
            });
          } else {
            Swal.fire({
              icon: "error",
              title: res.message,
              timer: 2000,
            });
          }
          setIsLoading(false);
        })
        .withFailureHandler((err) => {
          Swal.fire({
            icon: "error",
            title: "เกิดข้อผิดพลาด",
            text: err.message || "เกิดข้อผิดพลาดในการเข้าสู่ระบบ",
            timer: 2000,
          });
          setIsLoading(false);
        })
        .updateManager(formData);
    };

    return (
      <div className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6">
        {/* 1. Backdrop */}
        <div
          className="absolute inset-0 bg-black/60 transition-opacity"
          onClick={onClose}
        ></div>

        {/* 2. Dialog */}
        <div className="bg-white w-full max-w-md mx-auto rounded-lg shadow-lg z-50 overflow-y-auto animate-fade-in-up">
          {/* Header */}
          <div className="flex justify-between items-center p-4 border-b border-gray-200 rounded-t-lg">
            <h2 className="text-lg font-medium">แก้ไขข้อมูลผู้สัมภาษณ์</h2>
            <button
              onClick={onClose}
              className="btn btn-circle btn-ghost group"
            >
              <i className="fa-solid fa-xmark text-gray-500 group-hover:text-gray-700 duration-200"></i>
            </button>
          </div>

          {/* Body */}
          <form
            onSubmit={handleSubmit}
            className="w-full text-sm space-y-3 p-4"
          >
            {/* Fullname */}
            <div className="flex flex-col gap-1">
              <label htmlFor="fullname" className="flex gap-2">
                ชื่อ-สกุล <span className="text-red-500">*</span>
              </label>
              <input
                type="text"
                className="w-full input focus-within:border-none"
                id="fullname"
                name="fullname"
                value={formData.fullname}
                onChange={handleChange}
                placeholder="ชื่อ-สกุล"
                required
              />
            </div>

            <div className="w-full">
              <label className="text-sm font-medium text-gray-500 mb-1.5 ml-1 block">
                เลือกประเภทการจำกัดสิทธิ์
              </label>
              <select
                className="select select-bordered w-full"
                value={formData.permissionType}
                onChange={(e) =>
                  setFormData({ ...formData, permissionType: e.target.value })
                }
                disabled={isLoading}
              >
                <option value="">เลือกประเภท</option>
                <option value="ONLINE">ONLINE</option>
                <option value="ONSITE">ONSITE</option>
              </select>
            </div>

            <button
              type="submit"
              disabled={isLoading}
              className="w-full bg-emerald-600 hover:bg-emerald-500 py-2.5 text-white cursor-pointer rounded-box duration-200 mt-1 text-base"
            >
              {isLoading ? (
                <span className="loading loading-spinner loading-md"></span>
              ) : (
                "บันทึก"
              )}
            </button>
          </form>
        </div>
      </div>
    );
  };
</script>
