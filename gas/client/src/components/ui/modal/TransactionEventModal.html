<script type="text/babel">
  const { useState, useEffect } = React;

  const TransactionEventModal = ({ user, isOpen, onClose, event }) => {
    if (!isOpen) return null;

    const [historyData, setHistoryData] = useState([]);
    const [isLoading, setIsLoading] = useState(false);

    const formatThaiDate = (dateString) => {
      try {
        // Split string manually to handle BE years safely without Date object issues
        // Input: "2569-02-05T00:03:31+07:00"
        const [datePart, timePartWithOffset] = dateString.split("T");
        const [year, month, day] = datePart.split("-");
        const [time] = timePartWithOffset.split("+");
        const [hour, minute] = time.split(":");

        const thaiMonths = [
          "ม.ค.",
          "ก.พ.",
          "มี.ค.",
          "เม.ย.",
          "พ.ค.",
          "มิ.ย.",
          "ก.ค.",
          "ส.ค.",
          "ก.ย.",
          "ต.ค.",
          "พ.ย.",
          "ธ.ค.",
        ];
        const monthIndex = parseInt(month, 10) - 1;

        return {
          date: `${day} ${thaiMonths[monthIndex]} ${year}`,
          time: `${hour}:${minute} น.`,
        };
      } catch (e) {
        return { date: dateString, time: "" };
      }
    };

    const getInitials = (name) => {
      if (!name) return "?";
      if (name === "admin") return "AD";
      return name.substring(0, 2).toUpperCase();
    };

    const getAvatarColor = (name) => {
      if (name === "admin") return "bg-purple-100 text-purple-600";
      return "bg-blue-100 text-blue-600";
    };

    const fetchHistoryData = () => {
      setIsLoading(true);

      google.script.run
        .withSuccessHandler((res) => {
          if (res.success) {
            setHistoryData(res.data);
          } else {
            Swal.fire({
              icon: "error",
              title: res.message,
            });
          }
          setIsLoading(false);
        })
        .withFailureHandler((err) => {
          Swal.fire({
            icon: "error",
            title: err.message,
          });
          setIsLoading(false);
        })
        .getHistoryByEventId(event.Sheet_ID);
    };

    useEffect(() => {
      fetchHistoryData();
    }, []);

    return (
      <div className="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6">
        {/* 1. Backdrop */}
        <div
          className="absolute inset-0 bg-black/60 transition-opacity"
          onClick={onClose}
        ></div>

        {/* 2. Diahistory */}
        <div className="bg-white w-full max-w-lg mx-auto rounded-xl shadow-2xl z-50 flex flex-col max-h-[85vh] animate-fade-in-up">
          {/* --- Header (Sticky) --- */}
          <div className="flex justify-between items-center p-5">
            <div>
              <h2 className="text-lg font-semibold text-gray-800">
                ประวัติการจัดการ
              </h2>
              <p className="text-sm text-gray-500 mt-1">
                รายการความเคลื่อนไหวล่าสุดของอีเวนต์
              </p>
            </div>
            <button
              onClick={onClose}
              className="btn btn-circle btn-ghost group"
            >
              <i className="fa-solid fa-xmark text-gray-500 group-hover:text-gray-700 duration-200"></i>
            </button>
          </div>

          {/* --- Body (Scrollable) --- */}
          {isLoading ? (
            <div className="flex items-center justify-center py-12">
              <span className="loading loading-spinner"></span>
            </div>
          ) : (
            <div className="overflow-y-auto p-0 custom-scrollbar flex-1">
              {historyData && historyData.length > 0 ? (
                <div className="relative">
                  {/* Vertical Timeline Line */}
                  <div className="absolute left-8 top-0 bottom-0 w-px bg-gray-200 z-0 hidden sm:block"></div>

                  <ul className="space-y-0">
                    {historyData.map((history, index) => {
                      const { date, time } = formatThaiDate(history.TimeStamp);
                      const isLast = index === history.length - 1;

                      return (
                        <li
                          key={index}
                          className="relative flex items-center  gap-4 p-4 hover:bg-gray-50 transition-colors border-b border-gray-50 last:border-none last:rounded-b-xl" 
                        >
                          {/* Avatar / Icon */}
                          <div className="relative z-10 shrink-0">
                            <div
                              className={`size-8 rounded-full flex items-center justify-center text-xs font-bold shadow-sm ${getAvatarColor(history.Name)}`}
                            >
                              {getInitials(history.Name)}
                            </div>
                          </div>

                          {/* Content */}
                          <div className="flex-1 min-w-0 pt-1">
                            <div className="flex justify-between items-start gap-2">
                              <p className="text-sm font-semibold text-gray-900 truncate">
                                {history.Name}
                              </p>
                              <span className="text-xs text-gray-400 whitespace-nowrap font-mono">
                                {date} • {time}
                              </span>
                            </div>

                            <p className="text-sm text-gray-600 mt-0.5 break-words">
                              ดำเนินการ: {history.Action}
                            </p>
                          </div>
                        </li>
                      );
                    })}
                  </ul>
                </div>
              ) : (
                // Empty State
                <div className="flex flex-col items-center justify-center py-12 text-gray-400">
                  <div className="bg-gray-50 p-4 rounded-full mb-3">
                    <i className="fa-solid fa-clock-rotate-left text-2xl text-gray-300"></i>
                  </div>
                  <p className="text-sm">ไม่พบประวัติการใช้งาน</p>
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    );
  };
</script>
