<script type="text/babel">
  const { useHistory } = ReactRouterDOM;
  const EventCards = ({ events, date }) => {
    const history = useHistory();

    const formatDate = (dateString) => {
      if (!dateString) return "-";
      const date = new Date(dateString);
      if (date.getFullYear() > 2400) date.setFullYear(date.getFullYear() - 543);
      return date.toLocaleDateString("th-TH", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      });
    };

    const handleClick = (eventId, name, location, type, eventJobType) => {
      const params = new URLSearchParams();

      if (eventId) params.append("eventId", eventId);
      if (eventJobType) params.append("eventJobType", eventJobType);
      if (name) params.append("eventName", name);
      if (location) params.append("eventLocation", location);
      if (type) params.append("eventType", type);

      history.push({
        pathname: "/events/slots",
        search: params.toString(),
      });
      window.scrollTo(0, 0);
    };

    return (
      <>
        {events.map((event, index) => (
          <div
            key={index}
            onClick={() =>
              handleClick(
                event.Sheet_ID,
                event.Event_Name,
                event.Location,
                event.Event_Type,
                event.Job_Type
              )
            }
            className="group rounded-xl overflow-hidden shadow-lg hover:-translate-y-1 transition-all duration-500 cursor-pointer"
          >
            <figure className="relative h-48 sm:h-56 overflow-hidden p-2">
              <img
                src={event.Image_Url}
                alt={event.Event_Name}
                className="w-full h-full object-cover transition-tranform duration-500 group-hover:scale-105"
              />

              {event.Status && (
                <div
                  className={`absolute top-4 right-4 badge border-none rounded-full text-white font-medium shadow-sm ${
                    event.Status ? "bg-emerald-500" : "bg-rose-500"
                  }`}
                >
                  {event.Status ? "Active" : "Inactive"}
                </div>
              )}

              {/* Badge ประเภท Event (Top-Left Optional) */}
              <div className="absolute top-4 left-4 badge badge-ghost rounded-full bg-base-300 backdrop-blur-sm text-xs font-bold">
                {event.Event_Type}
              </div>
            </figure>
            <div className="p-4 sm:p-5 border-t border-gray-100">
              <div className="flex flex-col items-start justify-center gap-1">
                <h2 className="text-lg font-medium">{event.Event_Name}</h2>

                <div className="space-y-2 mt-2 text-sm text-gray-600">
                  {(event.Opening_At && event.Closing_At) && (
                    <div className="flex items-start gap-2">
                      <span className="mt-0.5 text-emerald-600">
                        <i className="fa-regular fa-clock"></i>
                      </span>
                      <div className="flex flex-col">
                        <span>เริ่ม: {formatDate(event.Opening_At)}</span>
                        <span>สิ้นสุด: {formatDate(event.Closing_At)}</span>
                      </div>
                    </div>
                  )}
                  {event.Location && (
                    <div className="flex items-center gap-2">
                      <span className="text-rose-500">
                        <i className="fa-solid fa-location-dot"></i>
                      </span>
                      <span className="line-clamp-1">{event.Location}</span>
                    </div>
                  )}
                </div>

                {event.status && (
                  <p className="w-full text-sm text-gray-600 text-center">
                    {event.status === "ว่าง" ? (
                      <span className="text-success">ว่าง</span>
                    ) : (
                      <span className="text-error">ไม่ว่าง</span>
                    )}
                  </p>
                )}
              </div>
            </div>
          </div>
        ))}
      </>
    );
  };
</script>
