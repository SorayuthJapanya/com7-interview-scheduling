<script type="text/babel">
  const { useState } = React;

  const CandidateForgotPasswordForm = ({ setSelectedForgotPassword }) => {
    const [formData, setFormData] = useState({
      type: "candidate",
      email: "",
      password: "",
      confirmPassword: "",
    });
    const [showPassword, setShowPassword] = useState(false);
    const [showConfirmPassword, setShowConfirmPassword] = useState(false);
    const [isLoading, setIsLoading] = useState(false);

    const englishOnlyRegex =
      /^[A-Za-z0-9!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?`~]*$/;

    const handleChange = (e) => {
      const { name, value } = e.target;

      if (name === "password" || name === "confirmPassword") {
        if (!englishOnlyRegex.test(value)) {
          return;
        }
      }

      setFormData({
        ...formData,
        [name]: value,
      });
    };

    const handleSubmit = (e) => {
      e.preventDefault();
      setIsLoading(true);

      if (formData.password !== formData.confirmPassword) {
        Swal.fire({
          icon: "warning",
          title: "รหัสผ่านไม่ตรงกัน",
        });
        setIsLoading(false);
        return;
      }

      google.script.run
        .withSuccessHandler((res) => {
          if (res.success === true) {
            Swal.fire({
              icon: "success",
              title: res.message,
              timer: 2000,
            });
            setSelectedForgotPassword(null);
          } else {
            Swal.fire({
              icon: "error",
              title: res.message,
              timer: 2000,
            });
          }
        })
        .withFailureHandler((err) => {
          Swal.fire({
            icon: "error",
            title: "เกิดข้อผิดพลาด",
            text: err.message || "เกิดข้อผิดพลาดในการเปลี่ยนรหัสผ่าน",
            timer: 2000,
          });
          setIsLoading(false);
        })
        .forgotPassword(formData);
    };

    return (
      <div className="w-full space-y-5 animate-fade-in">
        <div className="flex items-center gap-2">
          <img
            src="https://drive.google.com/thumbnail?id=1INCNKnZiGOhVipsjSy62m3EamgKdoDpn"
            alt="user-logo"
            className="size-7 sm:size-8 rounded-full"
          />
          <p className="font-semibold text-emerald-700 text-lg sm:text-xl">
            สำหรับผู้สมัคร ( เปลี่ยนรหัสผ่าน )
          </p>
        </div>

        <form onSubmit={handleSubmit} className="w-full text-sm space-y-3">
          {/* Email */}
          <div className="flex flex-col gap-1">
            <label htmlFor="email" className="flex gap-2">
              อีเมล <span className="text-xs sm:text-sm text-red-500">*</span>
            </label>
            <input
              type="email"
              className="w-full input focus-within:border-none"
              id="email"
              name="email"
              onChange={handleChange}
              placeholder="อีเมล"
              required
            />
          </div>

          {/* Password */}
          <div className="relative flex flex-col gap-1">
            <div className="flex justify-between items-end">
              <label htmlFor="password" className="text-sm font-medium">
                รหัสผ่านใหม่{" "}
                <span className="text-xs text-red-500 font-normal">
                  * (ความยาวอย่างน้อย 6 ตัว)
                </span>
              </label>
            </div>
            <input
              type={showPassword ? "text" : "password"}
              className="w-full relative input focus-within:border-none"
              id="password"
              name="password"
              onChange={handleChange}
              placeholder="รหัสผ่าน"
              required
            />

            <span
              onClick={() => setShowPassword(!showPassword)}
              className="absolute top-7 right-3 size-8 rounded-full hover:bg-base-300 cursor-pointer duration-200 active:scale-95 transform transition-all text-gray-600 flex items-center justify-center"
            >
              {showPassword ? (
                <i className="fa-solid fa-eye-slash"></i>
              ) : (
                <i className="fa-solid fa-eye"></i>
              )}
            </span>
          </div>

          {/* Confirm Password */}
          <div className="relative flex flex-col gap-1">
            <div className="flex justify-between items-end">
              <label htmlFor="confirmPassword" className="text-sm font-medium">
                ยืนยันรหัสผ่าน{" "}
                <span className="text-xs text-red-500 font-normal">*</span>
              </label>
            </div>
            <input
              type={showConfirmPassword ? "text" : "password"}
              className="w-full relative input focus-within:border-none"
              id="confirmPassword"
              name="confirmPassword"
              onChange={handleChange}
              placeholder="ยืนยันรหัสผ่าน"
              required
            />

            <span
              onClick={() => setShowConfirmPassword(!showConfirmPassword)}
              className="absolute top-7 right-3 size-8 rounded-full hover:bg-base-300 cursor-pointer duration-200 active:scale-95 transform transition-all text-gray-600 flex items-center justify-center"
            >
              {showConfirmPassword ? (
                <i className="fa-solid fa-eye-slash"></i>
              ) : (
                <i className="fa-solid fa-eye"></i>
              )}
            </span>
          </div>

          <button
            type="submit"
            disabled={isLoading}
            className="w-full h-11 bg-emerald-600 hover:bg-emerald-500 text-white cursor-pointer rounded-box duration-200 mt-1 text-base flex items-center justify-center"
          >
            {isLoading ? (
              <span className="inline-block">
                <Loader />
              </span>
            ) : (
              "เปลี่ยนรหัสผ่าน"
            )}
          </button>
        </form>
      </div>
    );
  };
</script>
