<script type="text/babel">
  const { useState, useEffect } = React;
  const { useLocation, useHistory } = ReactRouterDOM;

  const AddInterviewPage = ({ user }) => {
    const location = useLocation();
    const history = useHistory();

    // 1. Setup Query Params
    const query = React.useMemo(
      () => new URLSearchParams(location.search),
      [location.search],
    );
    const eventId = query.get("eventId") || "";
    const eventJobType = query.get("eventJobType") || "";
    const slotId = query.get("slotId") || "";
    const eventName = query.get("eventName") || "";
    const timePeriod = query.get("time") || "";
    const buName = query.get("buName") || "";
    const shop = query.get("shop") || "";
    const preferredProvince = query.get("preferredProvince") || "";
    const date = query.get("date") || "";

    const effectiveProvince = preferredProvince ? preferredProvince : "กรุงเทพมหานคร";

    const effectiveDistrict = preferredProvince ? "" : "เขตบางนา";

    // 2. Initial State (จำลองข้อมูลตามที่คุณให้มา)
    const initialFormState = {
      eventId: eventId || "",
      slotId: slotId || "",
      candidateId: user.userId || "",
      fullname: user.name || "",
      nickname: "",
      birthdate: "",
      age: "",
      gender: "",
      weight: "",
      height: "",
      nationality: "",
      nationalId: "",
      maritalStatus: "",
      military: "",
      militaryReason: "",
      currentAddress: "",
      phoneNumber: user.phone || "",
      email: user.email || "",
      lineId: "",
      highestEducation: "",
      institution: "",
      faculty: "",
      major: "",
      workLocation: "",
      workPeriod: "",
      workPosition: "",
      workDescription: "",
      saleExperience: 0,
      positionType: eventJobType || "",
      positionApplied: "",
      preferredProvince: effectiveProvince,
      preferredDistrict: effectiveDistrict,
      expectedSalary: 0,
      availableStartDate: "",
    };

    const [formData, setFormData] = useState(initialFormState);
    const [allowPDPA, setAllowPDPA] = useState(false);
    const [isLoading, setIsLoading] = useState(false);
    const [rawLocationData, setRawLocationData] = useState([]); // All data stucture
    const [provinceOptions, setProvinceOptions] = useState([]); // รายชื่อจังหวัด (String[])
    const [districtOptions, setDistrictOptions] = useState([]); // รายชื่ออําเภอ (String[])
    const [isLoadingLocation, setIsLoadingLocation] = useState(false);
    const [errors, setErrors] = useState({});
    const [resume, setResume] = useState(null);

    const goBack = () => {
      history.goBack();
      window.scrollTo(0, 0);
    };

    // 3. Handle Input Change
    const handleChange = (e) => {
      const { name, value } = e.target;
      setFormData((prev) => {
        const newData = { ...prev, [name]: value };

        if (name === "preferredProvince") {
          newData.preferredDistrict = "";
        }
        return newData;
      });
    };

    const handleDateChange = (field, value) => {
      setFormData((prev) => ({ ...prev, [field]: value }));
    };

    const readFileAsBase64 = (file) => {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = (error) => reject(error);
        reader.readAsDataURL(file);
      });
    };

    const fetchThaiLocation = async () => {
      const CACHE_KEY = "thai_location_data";
      const cached = sessionStorage.getItem(CACHE_KEY);
      if (cached) {
        const sortedData = JSON.parse(cached);
        setRawLocationData(sortedData);
        setProvinceOptions(sortedData.map((item) => item.name_th));
        return;
      }

      setIsLoadingLocation(true);
      try {
        const response = await fetch(
          "https://raw.githubusercontent.com/kongvut/thai-province-data/refs/heads/master/api/latest/province_with_district_and_sub_district.json",
        );
        const data = await response.json();
        const sortedData = data.sort((a, b) =>
          a.name_th.localeCompare(b.name_th),
        );
        sessionStorage.setItem(CACHE_KEY, JSON.stringify(sortedData));
        setRawLocationData(sortedData);
        setProvinceOptions(sortedData.map((item) => item.name_th));
      } catch (error) {
        console.error("Failed to fetch location data:", error);
      } finally {
        setIsLoadingLocation(false);
      }
    };

    const validateRequiredFields = () => {
      let isValid = true;
      const newErrors = {};

      const excludedFields = [];

      if (formData.military !== "ได้รับการยกเว้น") {
        excludedFields.push("militaryReason");
      }

      Object.keys(formData).forEach((key) => {
        if (excludedFields.includes(key)) return;

        const value = formData[key];

        if (value === "" || value === null || value === undefined) {
          newErrors[key] = "กรุณากรอกข้อมูล";
          isValid = false;
        }
      });

      setErrors(newErrors);
      return isValid;
    };

    const handleSubmit = async (e) => {
      e.preventDefault();

      if (!allowPDPA) {
        Swal.fire({
          icon: "warning",
          title: "กรุณายอมรับข้อตกลง",
        });
        return;
      }

      if (!validateRequiredFields()) {
        Swal.fire({
          icon: "error",
          title: "ข้อมูลไม่ครบถ้วน",
          text: "กรุณากรอกข้อมูลในช่องที่มีสีแดงให้ครบ",
          timer: 2000,
          showConfirmButton: false,
        });
        return;
      }

      const max_size = 5 * 1024 * 1024; // 5MB

      if (resume && resume.size > max_size) {
        Swal.fire({
          icon: "warning",
          title: "ขนาดไฟล์ไม่เกิน 5MB",
        });
        return;
      }

      const result = await Swal.fire({
        icon: "question",
        title: "ยืนยันความถูกต้อง",
        text: `คุณต้องการลงทะเบียนสัมภาษณ์สำหรับ ${eventName} (${shop ? shop : buName}) วันที่ ${date} ช่วงเวลา ${timePeriod} น. ใช่หรือไม่`,
        showCancelButton: true,
        confirmButtonText: "ใช่ ลงทะเบียนเลย",
        cancelButtonText: "ยกเลิก",
      });

      if (!result.isConfirmed) {
        return;
      }

      Swal.fire({
        title: "กำลังบันทึกข้อมูล...",
        text: `กำลังลงทะเบียนสัมภาษณ์สำหรับ ${eventName} (${shop ? shop : buName}) วันที่ ${date} ช่วงเวลา ${timePeriod} น.`,
        allowOutsideClick: false,
        didOpen: () => {
          Swal.showLoading();
        },
      });

      try {
        setIsLoading(true);
        let filePayload = null;

        if (resume) {
          const base64Data = await readFileAsBase64(resume);
          filePayload = {
            base64Data,
            fileName: resume.name,
            mimeType: resume.type,
          };
        }

        const payload = {
          ...formData,
          shop: shop,
          militaryStatus:
            formData.military === "ได้รับการยกเว้น"
              ? `${formData.military} เนื่องจาก: ${formData.militaryReason}`
              : formData.military,
          file: filePayload,
        };

        google.script.run
          .withSuccessHandler((res) => {
            if (res.success === true) {
              Swal.fire({
                icon: "success",
                title: res.message,
                timer: 2000,
              });

              // --- TRIGGER BACKGROUND JOB ปล่อยให้มันทำงานเบื้องหลังโดยที่ผู้สมัครไม่ต้องรอ! ---
              if (res.pendingExtras && res.extrasPayload) {
                google.script.run.processInterviewExtras(res.extrasPayload);
              }

              history.push("/interview");
              window.scrollTo(0, 0);
            } else {
              Swal.fire({
                icon: "error",
                title: res.message,
                timer: 2000,
              });
            }
            setIsLoading(false);
          })
          .withFailureHandler((err) => {
            Swal.fire({
              icon: "error",
              title: "เกิดข้อผิดพลาด",
              text: err.message || "เกิดข้อผิดพลาดในการเข้าสู่ระบบ",
              timer: 2000,
            });
            setIsLoading(false);
          })
          .createInterview(payload);
      } catch (error) {
        Swal.fire({
          icon: "error",
          title: error.message || "บันทึกไม่สําเร็จ",
        });
        setIsLoading(false);
      }
    };

    useEffect(() => {
      if (formData.birthdate) {
        const birthDate = new Date(formData.birthdate);
        const today = new Date();
        let age = today.getFullYear() - birthDate.getFullYear();
        const m = today.getMonth() - birthDate.getMonth();

        if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
          age--;
        }

        setFormData((prev) => {
          if (prev.age !== age) {
            return { ...prev, age: age };
          }
          return prev;
        });
      }
    }, [formData.birthdate]);

    // เมื่อเลือกจังหวัด -> อัปเดตอำเภอ
    useEffect(() => {
      if (formData.preferredProvince && rawLocationData.length > 0) {
        const selectedProvince = rawLocationData.find(
          (p) => p.name_th === formData.preferredProvince,
        );

        if (selectedProvince && selectedProvince.districts) {
          const sortedDistricts = selectedProvince.districts.sort((a, b) =>
            a.name_th.localeCompare(b.name_th),
          );

          // map เอาเฉพาะชื่ออำเภอ (name_th)
          const districtNames = sortedDistricts.map((d) => d.name_th);
          setDistrictOptions(districtNames);
        } else {
          setDistrictOptions([]);
        }
      } else {
        setDistrictOptions([]);
      }
    }, [formData.preferredProvince, rawLocationData]);

    useEffect(() => {
      fetchThaiLocation();
    }, []);

    return (
      <div className="min-h-screen bg-base-200 padding-container xl:px-20 pb-16">
        <div className="max-w-6xl mx-auto animate-fade-in-up">
          {/* Header */}
          <div className="w-full flex flex-col items-center lg:items-start gap-1 pt-16 pb-6">
            <div className="space-y-1 text-center lg:text-left">
              <h1 className="text-2xl sm:text-3xl ">
                ลงทะเบียนผู้สมัครสัมภาษณ์
              </h1>
              <h3 className="text-base md:text-lg">
                {eventName} ({shop ? shop : buName}) วันที่ {date} ช่วงเวลา {timePeriod} น.
              </h3>
              <p className="text-xs sm:text-sm text-gray-500">
                * หลังจากบันทึกข้อมูลเรียบร้อย
                จะมีอีเมลยืนยันการลงทะเบียนเพื่อแจ้งให้ทราบ
              </p>
            </div>
          </div>

          <form
            onSubmit={handleSubmit}
            className="space-y-6 p-4 bg-base-300 rounded-xl animate-fade-in-up"
          >
            <FormSection title="เลือกงานที่ต้องการจะสมัคร" icon="fa-briefcase">
              <InputField
                label="ประเภทตำแหน่งงานที่สมัคร"
                name="positionType"
                value={formData.positionType}
                onChange={handleChange}
                colSpan={2}
                readOnly
                required
              />

              {eventJobType === "พนักงานประจำหน้าร้านสาขา Studio7 & BaNANA" ? (
                <SelectField
                  label="ตำแหน่งที่สมัคร"
                  name="positionApplied"
                  value={formData.positionApplied}
                  onChange={handleChange}
                  colSpan={2}
                  options={[
                    "พนักงานประจำหน้าร้านสาขา Studio7",
                    "พนักงานประจำหน้าร้านสาขา BaNANA",
                  ]}
                  required
                />
              ) : (
                <InputField
                  label="ตำแหน่งที่สมัคร"
                  name="positionApplied"
                  value={formData.positionApplied}
                  onChange={handleChange}
                  placeholder="ตำแหน่งที่สมัคร"
                  colSpan={2}
                  required
                />
              )}

              {/* จังหวัด */}
              <SearchableSelect
                label="จังหวัดที่สะดวกปฏิบัติงาน"
                name="preferredProvince"
                value={formData.preferredProvince || ""}
                onChange={handleChange}
                options={isLoadingLocation ? [] : provinceOptions}
                disabled
                colSpan={1}
                required
              />

              {/* อำเภอ */}
              <SearchableSelect
                label="อำเภอที่สะดวกปฏิบัติงาน"
                name="preferredDistrict"
                value={formData.preferredDistrict || ""}
                onChange={handleChange}
                options={districtOptions}
                disabled={isLoadingLocation || !formData.preferredProvince || eventJobType !== "พนักงานประจำหน้าร้านสาขา True & Studio7 & BaNaNa"}
                colSpan={1}
                required
              />

              <InputField
                label="เงินเดือนที่คาดหวัง"
                name="expectedSalary"
                type="number"
                value={formData.expectedSalary}
                onChange={handleChange}
                placeholder="เงินเดือนที่คาดหวัง"
                required
              />

              <div className="w-full">
                <label className="text-xs font-semibold text-gray-500 mb-1.5 ml-1 block">
                  วันที่เริ่มงานได้
                </label>
                <FlatpickrInput
                  value={formData.availableStartDate}
                  onChange={(val) =>
                    handleDateChange("availableStartDate", val)
                  }
                  minDate={new Date()} // เลือกได้ตั้งแต่วันถัดไปเป็นต้นไป
                  icon={<i className="fa-regular fa-calendar"></i>}
                  placeholder="เลือกวันที่"
                  options={{ dateFormat: "Y-m-d" }}
                  required
                />
              </div>

              <div className={`form-control w-full col-span-1 lg:col-span-4`}>
                <label className="label">
                  <span className="label-text font-medium">
                    Resume{" "}
                    <span className="text-error text-xs sm:text-sm">
                      * ขนาดไฟล์ไม่เกิน 5MB (PDF เท่านั้น)
                    </span>
                  </span>
                </label>
                <input
                  type="file"
                  name="resume"
                  accept="application/pdf"
                  onChange={(e) =>
                    e.target.files[0] && setResume(e.target.files[0])
                  }
                  className="input input-bordered w-full file-input file-input-bordered p-0"
                />
              </div>
            </FormSection>

            {/* 1. ข้อมูลส่วนตัว (Personal Info) */}
            <FormSection title="ข้อมูลส่วนตัว" icon="fa-user">
              <InputField
                label="ชื่อ-นามสกุล"
                name="fullname"
                value={formData.fullname}
                onChange={handleChange}
                colSpan={2}
                required
                readOnly
              />

              <InputField
                label="ชื่อเล่น"
                name="nickname"
                value={formData.nickname}
                onChange={handleChange}
                placeholder="ชื่อเล่น"
                required
              />

              <SelectField
                label="เพศ"
                name="gender"
                value={formData.gender}
                onChange={handleChange}
                options={["ชาย", "หญิง", "ไม่ระบุเพศ"]}
                required
              />

              <div className="w-full">
                <label className="text-xs font-semibold text-gray-500 mb-1.5 ml-1 block">
                  วันเกิด
                </label>
                <FlatpickrInput
                  value={formData.birthdate}
                  onChange={(val) => handleDateChange("birthdate", val)}
                  icon={<i className="fa-regular fa-calendar"></i>}
                  placeholder="เลือกวันที่"
                  options={{ dateFormat: "Y-m-d" }}
                  required
                />
              </div>

              <InputField
                label="อายุ (ปี)"
                name="age"
                type="number"
                value={formData.age}
                onChange={handleChange}
                readOnly
                required
              />

              <InputField
                label="น้ำหนัก (กก.)"
                name="weight"
                type="number"
                value={formData.weight}
                onChange={handleChange}
                placeholder="น้ำหนัก (กก.)"
                required
              />

              <InputField
                label="ส่วนสูง (ซม.)"
                name="height"
                type="number"
                value={formData.height}
                onChange={handleChange}
                placeholder="ส่วนสูง (ซม.)"
                required
              />

              <InputField
                label="เลขบัตรประชาชน"
                name="nationalId"
                value={formData.nationalId}
                onChange={handleChange}
                placeholder="1509911264926"
                required
              />

              <InputField
                label="สัญชาติ"
                name="nationality"
                value={formData.nationality}
                onChange={handleChange}
                placeholder="สัญชาติ"
                required
              />

              <SelectField
                label="สถานภาพ"
                name="maritalStatus"
                value={formData.maritalStatus}
                onChange={handleChange}
                options={["โสด", "สมรส", "หม้าย", "หย่าร้าง", "แยกกันอยู่"]}
                required
              />

              <SelectField
                label="สถานะทางทหาร"
                name="military"
                value={formData.military}
                onChange={handleChange}
                options={[
                  "ผ่านการเกณฑ์ทหารแล้ว",
                  "ได้รับการยกเว้น",
                  "ยังไม่ได้เกณฑ์",
                ]}
                required
              />

              {formData.military === "ได้รับการยกเว้น" && (
                <InputField
                  label="ระบุสาเหตุ (เนื่องจาก)"
                  name="militaryReason"
                  value={formData.militaryReason}
                  onChange={handleChange}
                  placeholder="เช่น จับได้ใบดำ, ร่างกายไม่สมบูรณ์"
                  required
                />
              )}

              <InputField
                label="ที่อยู่ปัจจุบัน"
                name="currentAddress"
                placeholder="(ตย. 45/1 ซอยนิมมานเหมินท์ ต.สุเทพ อ.เมือง เชียงใหม่ 50200)"
                value={formData.currentAddress}
                onChange={handleChange}
                colSpan={formData.military === "ได้รับการยกเว้น" ? 3 : 4}
                required
              />

              <InputField
                label="เบอร์โทรศัพท์"
                name="phoneNumber"
                value={formData.phoneNumber}
                onChange={handleChange}
                readOnly
                required
              />

              <InputField
                label="อีเมล"
                name="email"
                type="email"
                value={formData.email}
                onChange={handleChange}
                colSpan={2}
                readOnly
                required
              />

              <InputField
                label="Line ID"
                name="lineId"
                value={formData.lineId}
                onChange={handleChange}
                placeholder="Line ID"
                required
              />
            </FormSection>

            {/* 2. ประวัติการศึกษา (Education) */}
            <FormSection title="ประวัติการศึกษาสูงสุด" icon="fa-graduation-cap">
              <SelectField
                label="ระดับการศึกษาสูงสุด"
                name="highestEducation"
                value={formData.highestEducation}
                onChange={handleChange}
                options={[
                  "มัธยมศึกษาตอนต้น",
                  "มัธยมศึกษาตอนปลาย",
                  "ปวช.",
                  "ปวส.",
                  "ปริญญาตรี",
                  "สูงกว่าปริญาตรี",
                ]}
                required
              />

              <InputField
                label="สถาบันการศึกษา"
                name="institution"
                value={formData.institution}
                onChange={handleChange}
                colSpan={3}
                placeholder="สถาบันการศึกษา"
                required
              />

              <InputField
                label="คณะ"
                name="faculty"
                value={formData.faculty}
                onChange={handleChange}
                colSpan={2}
                placeholder="คณะ"
                required
              />

              <InputField
                label="สาขาวิชา"
                name="major"
                value={formData.major}
                onChange={handleChange}
                placeholder="สาขาวิชา"
                colSpan={2}
                required
              />
            </FormSection>

            {/* 3. ประสบการณ์การทำงาน (Work Experience) */}
            <FormSection title="ประวัติการทำงานล่าสุด" icon="fa-briefcase">
              <InputField
                label="สถานที่ทำงาน"
                name="workLocation"
                value={formData.workLocation}
                placeholder="สถานที่ทำงาน"
                colSpan={2}
                onChange={handleChange}
                required
              />

              <div className="gap-4">
                <InputField
                  label="ระยะเวลาการทำงาน (ตย. 1 ปี 3 เดือน)"
                  name="workPeriod"
                  value={formData.workPeriod}
                  placeholder="เช่น 1 ปี 3 เดือน"
                  onChange={handleChange}
                  required
                />
              </div>

              <InputField
                label="ตำแหน่ง"
                name="workPosition"
                value={formData.workPosition}
                placeholder="ตำแหน่ง"
                onChange={handleChange}
                required
              />

              <InputField
                label="รายละเอียดงาน"
                name="workDescription"
                value={formData.workDescription}
                placeholder="รายละเอียดงาน"
                colSpan={3}
                onChange={handleChange}
                required
              />

              <InputField
                label="ประสบการณ์ด้านการขาย (ปี)"
                name="saleExperience"
                type="number"
                value={formData.saleExperience}
                onChange={handleChange}
                required
              />
            </FormSection>

            {/* PDPA */}
            <div className="w-full bg-base-100 border border-base-300 p-6 flex justify-start gap-2 rounded-lg">
              <input
                type="checkbox"
                id="allowPDPA"
                checked={allowPDPA}
                onChange={(e) => setAllowPDPA(e.target.checked)}
                className="checkbox checkbox-sm checkbox-success rounded-sm"
              />
              <label htmlFor="allowPDPA" className="text-sm cursor-pointer">
                ข้าพเจ้าให้ความยินยอมหรือปฏิเสธไม่ให้ความยินยอมรวบรวม เก็บ
                ประมวลผลและเปิดเผยในข้อมูลส่วนบุคคลของข้าพเจ้าด้วยความสมัครใจ
                ปราศจากการบังคับหรือชักจูง
                และข้าพเจ้าทราบว่าข้าพเจ้าสามารถถอนความยินยอมนี้เสียเมื่อใดก็ได้
                เว้นแต่ในกรณี
                มีข้อจำกัดสิทธิตามกฎหมายหรือยังมีสัญญาระหว่างข้าพเจ้ากับบริษัทดังกล่าวที่ให้ประโยชน์แก่ข้าพเจ้าอยู่
              </label>
            </div>

            {/* Action Buttons */}
            <div className="flex items-center justify-center gap-4 mt-8">
              <button
                type="button"
                className="btn btn-ghost text-gray-500 font-medium rounded-lg"
                onClick={() => {
                  history.goBack();
                  window.scrollTo(0, 0);
                }}
              >
                ยกเลิก
              </button>
              <button
                type="submit"
                className="btn bg-emerald-600 font-medium rounded-lg text-white shadow-lg hover:scale-105 transition-transform"
                disabled={isLoading}
              >
                {isLoading ? (
                  <>
                    <span className="loading loading-spinner loading-sm text-white"></span>
                    กําลังบันทึก...
                  </>
                ) : (
                  <>
                    <i className="fas fa-save mr-2"></i> บันทึกข้อมูล
                  </>
                )}
              </button>
            </div>
          </form>
        </div>
      </div>
    );
  };
</script>
