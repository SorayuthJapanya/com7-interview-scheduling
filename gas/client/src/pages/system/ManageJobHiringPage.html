<script type="text/babel">
  const { useState, useEffect } = React;

  const ManageJobHiringPage = () => {
    const [images, setImages] = useState([]);
    const [isLoading, setIsLoading] = useState(false);
    const [openAddModal, setOpenAddModal] = useState(false);

    const fetchImages = () => {
      setIsLoading(true);

      google.script.run
        .withSuccessHandler((res) => {
          if (res) {
            setImages(res);
            setIsLoading(false);
          } else {
            setImages([]);
            setIsLoading(false);
          }
        })
        .getAllJobHiringPosterUrl();
    };

    useEffect(() => {
      fetchImages();
    }, []);

    return (
      <div className="w-full max-w-7xl xl:max-w-[1440px] mx-auto pb-24">
        {/* Header & Filter Section */}
        <div className="flex flex-col sm:flex-row items-center justify-center sm:justify-between gap-6 mb-8 animate-fade-in-up">
          <div className="flex flex-col text-center sm:text-start">
            <SystemHeader
              title="จัดการตำแหน่งงานว่าง"
              subTitle="ตรวจสอบและแก้ไขข้อมูลตำแหน่งงานว่างในระบบ"
            />
          </div>

          <button
            onClick={() => setOpenAddModal(true)}
            className="btn bg-emerald-600 hover:bg-emerald-500 text-white  hover:scale-110 duration-300 transition-all"
          >
            เพิ่มรูปภาพ
          </button>
        </div>

        {/* Image Section */}
        {isLoading ? (
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-fade-in-up">
            {[...Array(3)].map((_, i) => (
              <div key={i} className="flex flex-col gap-4 w-full animate-pulse">
                <div className="skeleton h-48 w-full rounded-xl"></div>
                <div className="skeleton h-4 w-28"></div>
                <div className="skeleton h-4 w-full"></div>
                <div className="skeleton h-4 w-full"></div>
              </div>
            ))}
          </div>
        ) : images.length > 0 ? (
          <div className="w-full animate-fade-in-up">
            <PreviewJobHiring images={images} onRefresh={fetchImages} />
          </div>
        ) : (
          <div className="animate-fade-in-up">
            <div className="w-full py-16 flex flex-col items-center justify-center border-2 border-dashed border-slate-200 rounded-2xl bg-slate-50/50">
              <div className="text-4xl mb-2">🖼️</div>
              <p className="text-gray-500 font-medium">ไม่พบรูปภาพ</p>
            </div>
          </div>
        )}

        {openAddModal && (
          <AddJobHiringModal
            onClose={() => setOpenAddModal(false)}
            onRefresh={fetchImages}
          />
        )}
      </div>
    );
  };
</script>
