    <style type="text/tailwindcss">
      html {
        scroll-behavior: smooth;

      * {
        font-family: "Prompt", sans-serif;
      }

      .bg-hero {
        background-image: linear-gradient(
            rgba(0, 0, 0, 0.6),
            rgba(0, 0, 0, 0.6)
          ),
          url("https://images.unsplash.com/photo-1573497620053-ea5300f94f21?q=80&w=1470&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
      }

      @theme {
        /* --- 1. Define Animations (ตั้งชื่อ class ที่จะใช้) --- */
        --animate-scale-up: scale-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        --animate-fade-in: fade-in 0.3s ease-out forwards;
        --animate-fade-in-up: fade-in-up 0.6s ease-out forwards;
        --animate-select-popup: select-popup 0.3s ease-out forwards;
        --animate-fade-in-right: fade-in-right 0.4s ease-out forwards;
        --animate-slide-down: slide-down 0.3s ease-out forwards;

        /* --- 2. Define Keyframes (กำหนดท่าทาง) --- */

        @keyframes scale-up {
          0% {
            opacity: 0;
            transform: scale(0.95);
          }
          100% {
            opacity: 1;
            transform: scale(1);
          }
        }

        @keyframes fade-in {
          0% {
            opacity: 0;
          }
          100% {
            opacity: 1;
          }
        }

        @keyframes fade-in-up {
          0% {
            opacity: 0;
            transform: translateY(20px);
          }
          100% {
            opacity: 1;
            transform: translateY(0);
          }
        }

        @keyframes select-popup {
          0% {
            opacity: 0;
            transform: translateY(20px);
          }
          100% {
            opacity: 1;
            transform: translateY(0);
          }
        }

        @keyframes fade-in-right {
          0% {
            opacity: 0;
            transform: translateX(-20px);
          }
          100% {
            opacity: 1;
            transform: translateX(0);
          }
        }

        @keyframes slide-down {
          0% {
            opacity: 0;
            transform: translateY(-10px);
          }
          100% {
            opacity: 1;
            transform: translateY(0);
          }
        }
      }

      @layer components {
        .padding-container {
          @apply px-6 sm:px-16 md:px-24 lg:px-32 xl:px-40 2xl:px-48;
        }
      }
    </style>
